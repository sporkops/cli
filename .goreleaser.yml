version: 2

project_name: spork

builds:
  - binary: spork
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "spork_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: sporkops
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: spork
    homepage: https://sporkops.com
    description: "Spork CLI — uptime monitoring from your terminal"
    license: MIT
    install: |
      bin.install "spork"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Keyless cosign signature over checksums.txt using the workflow's OIDC
# identity. install.sh verifies this signature, binding every release back to
# the sporkops/cli GitHub Actions workflow that produced it.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
